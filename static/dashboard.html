<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Procyon Park Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      background: #0d1117;
      color: #c9d1d9;
      padding: 16px;
      line-height: 1.5;
    }
    h1 { color: #58a6ff; font-size: 1.4em; margin-bottom: 16px; }
    h2 { color: #8b949e; font-size: 1em; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
    }

    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 14px;
    }

    .wf-card {
      background: #0d1117;
      border: 1px solid #30363d;
      border-left: 3px solid #58a6ff;
      border-radius: 4px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .wf-card b {
      background: #1f6feb33;
      color: #58a6ff;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 0.85em;
    }

    .wf-card.completion-completed { border-left-color: #3fb950; }
    .wf-card.completion-failed    { border-left-color: #f85149; }
    .wf-card.completion-cancelled { border-left-color: #8b949e; }

    #dashboard-completions { margin-top: 24px; }
    #dashboard-workitems { margin-top: 24px; }
    #dashboard-scope-violations { margin-top: 24px; }

    .sv-summary {
      color: #c9d1d9;
      font-size: 0.85em;
      margin-bottom: 8px;
      padding: 6px 8px;
      background: #21262d;
      border-radius: 3px;
    }
    .sv-list { margin: 0; padding: 0; }
    .sv-list li.sv-role {
      padding: 6px 8px;
      border-left: 3px solid #8b949e;
      margin-bottom: 4px;
      background: #0d1117;
      border-bottom: none;
      font-size: 0.85em;
    }
    .sv-list li.sv-single     { border-left-color: #d29922; }
    .sv-list li.sv-repeat     { border-left-color: #f85149; }
    .sv-list li.sv-systematic { border-left-color: #f85149; background: #2d1214; }
    .sv-count {
      background: #21262d;
      color: #f0883e;
      padding: 0 5px;
      border-radius: 3px;
      font-size: 0.85em;
      margin-left: 4px;
    }
    .sv-systematic .sv-count { color: #f85149; font-weight: bold; }

    .kanban {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .kanban-col {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 8px;
      min-height: 80px;
    }
    .kanban-header {
      font-size: 0.75em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8b949e;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid #21262d;
    }
    .kanban-count {
      display: inline-block;
      background: #21262d;
      color: #c9d1d9;
      padding: 0 6px;
      border-radius: 8px;
      font-size: 0.9em;
      margin-left: 4px;
    }
    .kanban-backlog     .kanban-header { color: #8b949e; }
    .kanban-ready       .kanban-header { color: #58a6ff; }
    .kanban-in-progress .kanban-header { color: #d29922; }
    .kanban-done        .kanban-header { color: #3fb950; }
    .kanban-blocked     .kanban-header { color: #f85149; }

    .wi-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-left: 3px solid #58a6ff;
      border-radius: 3px;
      padding: 6px 8px;
      margin-bottom: 6px;
      font-size: 0.82em;
    }
    .wi-card.wi-epic  { border-left-color: #bc8cff; }
    .wi-card.wi-story { border-left-color: #58a6ff; }
    .wi-card.wi-task  { border-left-color: #3fb950; }
    .wi-title { color: #c9d1d9; margin-bottom: 2px; }
    .wi-meta { color: #8b949e; font-size: 0.9em; }
    .wi-type {
      background: #21262d;
      padding: 0 4px;
      border-radius: 3px;
      text-transform: uppercase;
      font-size: 0.85em;
    }

    .feed { max-height: 80vh; overflow-y: auto; }
    ul { list-style: none; }
    li {
      padding: 5px 0;
      border-bottom: 1px solid #21262d;
      font-size: 0.82em;
    }
    li:last-child { border-bottom: none; }
    li.notif-hidden { display: none; }
    li.sev-warn    { color: #d29922; }
    li.sev-urgent  { color: #f85149; }
    li.sev-error   { color: #f85149; }
    .notif-scope {
      display: inline-block;
      background: #21262d;
      color: #8b949e;
      padding: 0 5px;
      border-radius: 3px;
      font-size: 0.9em;
    }

    .notif-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #21262d;
    }
    .notif-filters select,
    .notif-filters input {
      background: #0d1117;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 3px;
      padding: 3px 6px;
      font-size: 0.8em;
      font-family: inherit;
      flex: 1;
      min-width: 80px;
    }
    .notif-filters input::placeholder { color: #484f58; }
    .notif-filters button {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 3px;
      padding: 3px 8px;
      font-size: 0.8em;
      cursor: pointer;
    }
    .notif-filters button:hover { background: #30363d; }
    .filter-count {
      color: #8b949e;
      font-size: 0.75em;
      align-self: center;
      margin-left: auto;
    }

    .empty-state {
      color: #484f58;
      font-style: italic;
      text-align: center;
      padding: 20px;
    }

    .status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3fb950;
      margin-right: 6px;
    }
    .status-dot.disconnected { background: #f85149; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #161b22; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  </style>
</head>
<body>

  <h1><span class="status-dot" id="conn-dot"></span>Procyon Park</h1>

  <div class="layout">
    <div class="panel">
      <div id="dashboard-workflows">
        <h2>Active Workflows</h2>
        <div class="empty-state">Connecting...</div>
      </div>
      <div id="dashboard-completions">
        <h2>Recent Completions</h2>
        <div class="empty-state">Connecting...</div>
      </div>
      <div id="dashboard-workitems">
        <h2>Work Items</h2>
        <div class="empty-state">Connecting...</div>
      </div>
      <div id="dashboard-scope-violations">
        <h2>Scope Violations</h2>
        <div class="empty-state">Connecting...</div>
      </div>
    </div>

    <div class="panel feed">
      <div class="notif-filters" id="notif-filters">
        <select id="filter-scope" title="Scope"><option value="">all scopes</option></select>
        <select id="filter-workflow" title="Workflow"><option value="">all workflows</option></select>
        <select id="filter-severity" title="Severity">
          <option value="">all severities</option>
          <option value="info">info</option>
          <option value="warn">warn</option>
          <option value="urgent">urgent</option>
          <option value="error">error</option>
        </select>
        <input type="text" id="filter-text" placeholder="search..." />
        <button type="button" id="filter-clear">clear</button>
        <span class="filter-count" id="filter-count"></span>
      </div>
      <div id="dashboard-notifications">
        <h2>Recent Activity</h2>
        <div class="empty-state">Connecting...</div>
      </div>
    </div>
  </div>

  <script>
    const es = new EventSource('/api/sse/dashboard');
    const dot = document.getElementById('conn-dot');

    es.addEventListener('datastar-patch-elements', (e) => {
      // Parse the "elements " prefix from data lines
      const lines = e.data.split('\n');
      let html = '';
      for (const line of lines) {
        if (line.startsWith('elements ')) {
          html += line.substring(9);
        } else {
          html += line;
        }
      }

      // Find target element by ID in the fragment
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      const root = tmp.firstElementChild;
      if (root && root.id) {
        const target = document.getElementById(root.id);
        if (target) {
          target.outerHTML = root.outerHTML;
          if (root.id === 'dashboard-notifications') {
            refreshNotifFilters();
          }
        }
      }
    });

    es.onopen = () => { dot.classList.remove('disconnected'); };
    es.onerror = () => { dot.classList.add('disconnected'); };

    // --- Notification filtering ---
    // Filters are applied client-side so the SSE broadcast can stay simple
    // (one flat feed per tick). Filter state persists across SSE patches;
    // scope / workflow dropdowns are rebuilt from the data-attributes of the
    // currently rendered notifications.
    const filterScope    = document.getElementById('filter-scope');
    const filterWorkflow = document.getElementById('filter-workflow');
    const filterSeverity = document.getElementById('filter-severity');
    const filterText     = document.getElementById('filter-text');
    const filterClear    = document.getElementById('filter-clear');
    const filterCount    = document.getElementById('filter-count');

    function repopulateSelect(sel, values) {
      const prev = sel.value;
      const first = sel.querySelector('option[value=""]');
      sel.innerHTML = '';
      if (first) sel.appendChild(first);
      const sorted = Array.from(values).filter(v => v && v.length > 0).sort();
      for (const v of sorted) {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v.length > 30 ? v.substring(0, 30) + '…' : v;
        sel.appendChild(o);
      }
      if (prev && (prev === '' || values.has(prev))) sel.value = prev;
    }

    function applyNotifFilter() {
      const scope = filterScope.value;
      const wf    = filterWorkflow.value;
      const sev   = filterSeverity.value;
      const text  = filterText.value.trim().toLowerCase();
      const items = document.querySelectorAll('#dashboard-notifications li.notif-item');
      let shown = 0;
      items.forEach(li => {
        const ls  = li.getAttribute('data-scope')    || '';
        const lw  = li.getAttribute('data-workflow') || '';
        const lsv = li.getAttribute('data-severity') || '';
        let hide = false;
        if (scope && ls !== scope)    hide = true;
        if (wf    && lw !== wf)       hide = true;
        if (sev   && lsv !== sev)     hide = true;
        if (text  && !li.textContent.toLowerCase().includes(text)) hide = true;
        li.classList.toggle('notif-hidden', hide);
        if (!hide) shown++;
      });
      filterCount.textContent = items.length
        ? (shown + '/' + items.length)
        : '';
    }

    function refreshNotifFilters() {
      const scopes    = new Set();
      const workflows = new Set();
      document.querySelectorAll('#dashboard-notifications li.notif-item').forEach(li => {
        const s = li.getAttribute('data-scope');
        const w = li.getAttribute('data-workflow');
        if (s) scopes.add(s);
        if (w) workflows.add(w);
      });
      repopulateSelect(filterScope, scopes);
      repopulateSelect(filterWorkflow, workflows);
      applyNotifFilter();
    }

    [filterScope, filterWorkflow, filterSeverity].forEach(el => {
      el.addEventListener('change', applyNotifFilter);
    });
    filterText.addEventListener('input', applyNotifFilter);
    filterClear.addEventListener('click', () => {
      filterScope.value = '';
      filterWorkflow.value = '';
      filterSeverity.value = '';
      filterText.value = '';
      applyNotifFilter();
    });
  </script>

</body>
</html>
