<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Procyon Park Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      background: #0d1117;
      color: #c9d1d9;
      padding: 16px;
      line-height: 1.5;
    }
    h1 { color: #58a6ff; font-size: 1.4em; margin-bottom: 16px; }
    h2 { color: #8b949e; font-size: 1em; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
    }

    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 14px;
    }

    .wf-card {
      background: #0d1117;
      border: 1px solid #30363d;
      border-left: 3px solid #58a6ff;
      border-radius: 4px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .wf-card b {
      background: #1f6feb33;
      color: #58a6ff;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 0.85em;
    }

    .wf-card.completion-completed { border-left-color: #3fb950; }
    .wf-card.completion-failed    { border-left-color: #f85149; }
    .wf-card.completion-cancelled { border-left-color: #8b949e; }

    #dashboard-completions { margin-top: 24px; }
    #dashboard-workitems { margin-top: 24px; }

    .kanban {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .kanban-col {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 8px;
      min-height: 80px;
    }
    .kanban-header {
      font-size: 0.75em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8b949e;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid #21262d;
    }
    .kanban-count {
      display: inline-block;
      background: #21262d;
      color: #c9d1d9;
      padding: 0 6px;
      border-radius: 8px;
      font-size: 0.9em;
      margin-left: 4px;
    }
    .kanban-backlog     .kanban-header { color: #8b949e; }
    .kanban-ready       .kanban-header { color: #58a6ff; }
    .kanban-in-progress .kanban-header { color: #d29922; }
    .kanban-done        .kanban-header { color: #3fb950; }
    .kanban-blocked     .kanban-header { color: #f85149; }

    .wi-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-left: 3px solid #58a6ff;
      border-radius: 3px;
      padding: 6px 8px;
      margin-bottom: 6px;
      font-size: 0.82em;
    }
    .wi-card.wi-epic  { border-left-color: #bc8cff; }
    .wi-card.wi-story { border-left-color: #58a6ff; }
    .wi-card.wi-task  { border-left-color: #3fb950; }
    .wi-title { color: #c9d1d9; margin-bottom: 2px; }
    .wi-meta { color: #8b949e; font-size: 0.9em; }
    .wi-type {
      background: #21262d;
      padding: 0 4px;
      border-radius: 3px;
      text-transform: uppercase;
      font-size: 0.85em;
    }

    .feed { max-height: 80vh; overflow-y: auto; }
    ul { list-style: none; }
    li {
      padding: 5px 0;
      border-bottom: 1px solid #21262d;
      font-size: 0.82em;
    }
    li:last-child { border-bottom: none; }

    .empty-state {
      color: #484f58;
      font-style: italic;
      text-align: center;
      padding: 20px;
    }

    .status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3fb950;
      margin-right: 6px;
    }
    .status-dot.disconnected { background: #f85149; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #161b22; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  </style>
</head>
<body>

  <h1><span class="status-dot" id="conn-dot"></span>Procyon Park</h1>

  <div class="layout">
    <div class="panel">
      <div id="dashboard-workflows">
        <h2>Active Workflows</h2>
        <div class="empty-state">Connecting...</div>
      </div>
      <div id="dashboard-completions">
        <h2>Recent Completions</h2>
        <div class="empty-state">Connecting...</div>
      </div>
      <div id="dashboard-workitems">
        <h2>Work Items</h2>
        <div class="empty-state">Connecting...</div>
      </div>
    </div>

    <div class="panel feed">
      <div id="dashboard-notifications">
        <h2>Recent Activity</h2>
        <div class="empty-state">Connecting...</div>
      </div>
    </div>
  </div>

  <script>
    const es = new EventSource('/api/sse/dashboard');
    const dot = document.getElementById('conn-dot');

    es.addEventListener('datastar-patch-elements', (e) => {
      // Parse the "elements " prefix from data lines
      const lines = e.data.split('\n');
      let html = '';
      for (const line of lines) {
        if (line.startsWith('elements ')) {
          html += line.substring(9);
        } else {
          html += line;
        }
      }

      // Find target element by ID in the fragment
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      const root = tmp.firstElementChild;
      if (root && root.id) {
        const target = document.getElementById(root.id);
        if (target) {
          target.outerHTML = root.outerHTML;
        }
      }
    });

    es.onopen = () => { dot.classList.remove('disconnected'); };
    es.onerror = () => { dot.classList.add('disconnected'); };
  </script>

</body>
</html>
