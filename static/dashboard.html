<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Procyon Park Dashboard</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@starfederation/datastar/+esm"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      background: #0d1117;
      color: #c9d1d9;
      padding: 16px;
      line-height: 1.5;
    }
    h1 { color: #58a6ff; font-size: 1.4em; margin-bottom: 12px; }
    h2 { color: #8b949e; font-size: 1em; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .full-width { grid-column: 1 / -1; }

    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 14px;
    }

    ul { list-style: none; }
    li {
      padding: 4px 0;
      border-bottom: 1px solid #21262d;
      font-size: 0.85em;
    }
    li:last-child { border-bottom: none; }
    li strong { color: #c9d1d9; }

    li[data-status="running"]   { border-left: 3px solid #58a6ff; padding-left: 8px; }
    li[data-status="dispatched"] { border-left: 3px solid #58a6ff; padding-left: 8px; }
    li[data-status="pending"]   { border-left: 3px solid #8b949e; padding-left: 8px; }
    li[data-status="completed"] { border-left: 3px solid #3fb950; padding-left: 8px; }
    li[data-status="failed"]    { border-left: 3px solid #f85149; padding-left: 8px; }
    li[data-status="cancelled"] { border-left: 3px solid #8b949e; padding-left: 8px; opacity: 0.5; }

    li[data-severity="info"]    { border-left: 3px solid #58a6ff; padding-left: 8px; }
    li[data-severity="warn"]    { border-left: 3px solid #d29922; padding-left: 8px; }
    li[data-severity="urgent"]  { border-left: 3px solid #f85149; padding-left: 8px; }

    .feed { max-height: 300px; overflow-y: auto; }
    small { color: #8b949e; }
    .severity-info { color: #58a6ff; }
    .severity-warn { color: #d29922; }
    .severity-urgent { color: #f85149; }

    .empty-state {
      color: #484f58;
      font-style: italic;
      text-align: center;
      padding: 20px;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #161b22; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  </style>
</head>
<body>

  <h1>Procyon Park</h1>

  <div class="grid" data-init="@get('/api/sse/dashboard')">

    <!-- Workflows — replaced by SSE fragments -->
    <div class="panel">
      <div id="dashboard-workflows">
        <h2>Workflows</h2>
        <div class="empty-state">Connecting...</div>
      </div>
    </div>

    <!-- Tasks — replaced by SSE fragments -->
    <div class="panel">
      <div id="dashboard-tasks">
        <h2>Tasks</h2>
        <div class="empty-state">Connecting...</div>
      </div>
    </div>

    <!-- Observations — replaced by SSE fragments -->
    <div class="panel">
      <div id="dashboard-observations">
        <h2>Observations</h2>
        <div class="empty-state">Connecting...</div>
      </div>
    </div>

    <!-- Signals — replaced by SSE fragments -->
    <div class="panel">
      <div id="dashboard-signals">
        <h2>Signals</h2>
        <div class="empty-state">Connecting...</div>
      </div>
    </div>

    <!-- Notifications — replaced by SSE fragments -->
    <div class="panel full-width">
      <div class="feed" id="dashboard-notifications">
        <h2>Notifications</h2>
        <div class="empty-state">Connecting...</div>
      </div>
    </div>

  </div>

</body>
</html>
