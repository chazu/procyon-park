[project]
name = "procyon-park"
namespace = "ProcyonPark"
version = "0.1.0"

[dependencies]
alto = { git = "https://github.com/chazu/alto", branch = "main" }

[source]
dirs = ["src"]
entry = "Main.start"

[[target]]
name = "pp"
entry = "Main.start"
output = "pp"


[test]
dirs = ["src", "src/bbs", "src/api", "src/cli", "src/collections", "src/dispatcher", "src/dispatcher/actions", "src/harness", "src/identity", "src/roles", "src/worker", "test", "test/bbs", "test/api", "test/dispatcher"]
entry = "TestWorkflowRefactorMain.run"
